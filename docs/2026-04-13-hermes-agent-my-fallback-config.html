  <script>
(() => {
  const root = document.documentElement;
  const aliases = { paper: 'poster', list: 'rail' };
  const allowed = new Set(['rail', 'poster', 'editorial', 'midnight']);
  const storedAppearance = window.localStorage.getItem('blog-appearance-mode');
  const normalizedAppearance = aliases[storedAppearance ?? ''] ?? storedAppearance ?? root.dataset.appearance ?? 'rail';
  root.dataset.appearance = allowed.has(normalizedAppearance) ? normalizedAppearance : 'rail';
  const storedScheme = window.localStorage.getItem('blog-color-scheme');
  if (storedScheme === 'light' || storedScheme === 'dark') {
    root.dataset.colorScheme = storedScheme;
    root.dataset.colorSchemeMode = storedScheme;
  } else {
    root.dataset.colorScheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    root.dataset.colorSchemeMode = 'auto';
  }
})();
</script>

</main><div class="page-scrim" data-page-scrim hidden></div><script>
(() => {
  const appearanceKey = 'blog-appearance-mode';
  const schemeKey = 'blog-color-scheme';
  const root = document.documentElement;
  const doc = document;
  const body = doc.body;
  const scrim = doc.querySelector('[data-page-scrim]');
  let portalLayer = doc.querySelector('[data-popover-layer]');
  if (!(portalLayer instanceof HTMLElement)) {
    portalLayer = doc.createElement('div');
    portalLayer.className = 'popover-layer';
    portalLayer.setAttribute('data-popover-layer', '');
    body.appendChild(portalLayer);
  }
  doc.querySelectorAll('[data-popover-root]').forEach((rootElement) => {
    if (!(rootElement instanceof HTMLElement)) return;
    const panel = rootElement.querySelector('[data-popover-panel]');
    const name = rootElement.dataset.popoverName || '';
    if (panel instanceof HTMLElement && name) {
      panel.dataset.popoverPanelOwner = name;
    }
  });
  const aliases = { paper: 'poster', list: 'rail' };
  const allowed = new Set(['rail', 'poster', 'editorial', 'midnight']);
  const systemSchemeQuery = window.matchMedia('(prefers-color-scheme: dark)');
  const runViewTransition = (mutate) => {
    if (typeof doc.startViewTransition === 'function') {
      doc.startViewTransition(() => {
        mutate();
      });
      return;
    }
    mutate();
  };

  const isMobileSheet = () => window.matchMedia('(max-width: 860px)').matches;
  const getOpenPopovers = () => Array.from(doc.querySelectorAll('[data-popover-root][data-open="true"]'));
  const getPopoverParts = (rootElement) => {
    const owner = rootElement.dataset.popoverName || '';
    return {
      trigger: rootElement.querySelector('[data-popover-trigger]'),
      panel: owner
        ? doc.querySelector('[data-popover-panel-owner="' + owner + '"]')
        : rootElement.querySelector('[data-popover-panel]'),
    };
  };

  function normalizeAppearance(value) {
    const normalized = aliases[value ?? ''] ?? value ?? 'rail';
    return allowed.has(normalized) ? normalized : 'rail';
  }

  function syncOverlayState() {
    const active = isMobileSheet() && getOpenPopovers().length > 0;
    if (active) {
      body.dataset.overlayOpen = 'true';
    } else {
      delete body.dataset.overlayOpen;
    }
    if (scrim instanceof HTMLElement) {
      scrim.hidden = !active;
    }
  }

  function updateThemeButtons() {
    const activeAppearance = normalizeAppearance(root.dataset.appearance);
    const activeScheme = root.dataset.colorSchemeMode || 'auto';
    doc.querySelectorAll('[data-theme-value]').forEach((button) => {
      button.setAttribute('aria-pressed', String(button.getAttribute('data-theme-value') === activeAppearance));
    });
    doc.querySelectorAll('[data-scheme-value]').forEach((button) => {
      button.setAttribute('aria-pressed', String(button.getAttribute('data-scheme-value') === activeScheme));
    });
    const activeThemeButton = doc.querySelector('[data-theme-value="' + activeAppearance + '"]');
    doc.querySelectorAll('[data-active-theme-label]').forEach((label) => {
      label.textContent = activeThemeButton?.getAttribute('data-theme-label') || '轨道';
    });
  }

  function setAppearance(value) {
    const normalized = normalizeAppearance(value);
    if (normalized === normalizeAppearance(root.dataset.appearance)) {
      closeAllPopovers();
      updateThemeButtons();
      return;
    }
    runViewTransition(() => {
      root.dataset.appearance = normalized;
      window.localStorage.setItem(appearanceKey, normalized);
      closeAllPopovers();
      updateThemeButtons();
    });
  }

  function setScheme(value) {
    const nextMode = value === 'auto' ? 'auto' : value;
    if ((root.dataset.colorSchemeMode || 'auto') === nextMode) {
      closeAllPopovers();
      updateThemeButtons();
      return;
    }
    runViewTransition(() => {
      if (value === 'auto') {
        root.dataset.colorScheme = systemSchemeQuery.matches ? 'dark' : 'light';
        root.dataset.colorSchemeMode = 'auto';
        window.localStorage.removeItem(schemeKey);
      } else {
        root.dataset.colorScheme = value;
        root.dataset.colorSchemeMode = value;
        window.localStorage.setItem(schemeKey, value);
      }
      closeAllPopovers();
      updateThemeButtons();
    });
  }

  function clearPanelPosition(panel) {
    panel.style.left = '';
    panel.style.top = '';
    panel.style.right = '';
    panel.style.bottom = '';
    panel.style.maxHeight = '';
  }

  function movePanelIntoLayer(panel) {
    if (portalLayer instanceof HTMLElement && panel.parentElement !== portalLayer) {
      portalLayer.appendChild(panel);
    }
  }

  function restorePanel(rootElement, panel) {
    if (panel.parentElement !== rootElement) {
      rootElement.appendChild(panel);
    }
    delete panel.dataset.open;
    delete panel.dataset.popoverMode;
  }

  function closePopover(rootElement) {
    if (!(rootElement instanceof HTMLElement)) return;
    const { trigger, panel } = getPopoverParts(rootElement);
    if (!(trigger instanceof HTMLElement) || !(panel instanceof HTMLElement)) return;
    rootElement.dataset.open = 'false';
    delete rootElement.dataset.mode;
    trigger.setAttribute('aria-expanded', 'false');
    clearPanelPosition(panel);
    panel.hidden = true;
    restorePanel(rootElement, panel);
    syncOverlayState();
  }

  function closeAllPopovers(exceptElement) {
    getOpenPopovers().forEach((node) => {
      if (!exceptElement || node !== exceptElement) {
        closePopover(node);
      }
    });
  }

  function positionPopover(rootElement) {
    if (!(rootElement instanceof HTMLElement)) return;
    const { trigger, panel } = getPopoverParts(rootElement);
    if (!(trigger instanceof HTMLElement) || !(panel instanceof HTMLElement)) return;
    movePanelIntoLayer(panel);
    panel.hidden = false;
    panel.dataset.open = 'true';
    clearPanelPosition(panel);
    if (isMobileSheet()) {
      rootElement.dataset.mode = 'sheet';
      panel.dataset.popoverMode = 'sheet';
      panel.style.maxHeight = Math.floor(window.innerHeight * 0.68) + 'px';
      syncOverlayState();
      return;
    }
    rootElement.dataset.mode = 'popover';
    panel.dataset.popoverMode = 'popover';
    const viewportPadding = 12;
    const gap = 10;
    const maxHeight = Math.max(180, window.innerHeight - viewportPadding * 2);
    panel.style.maxHeight = maxHeight + 'px';
    const triggerRect = trigger.getBoundingClientRect();
    const panelRect = panel.getBoundingClientRect();
    const panelWidth = Math.max(panel.offsetWidth, panel.clientWidth, panelRect.width);
    const panelHeight = Math.max(panel.offsetHeight, panel.clientHeight, panelRect.height);
    let left = triggerRect.left;
    if (left + panelWidth > window.innerWidth - viewportPadding) {
      left = window.innerWidth - viewportPadding - panelWidth;
    }
    if (left < viewportPadding) {
      left = viewportPadding;
    }
    let top = triggerRect.bottom + gap;
    if (top + panelHeight > window.innerHeight - viewportPadding) {
      top = Math.max(viewportPadding, triggerRect.top - panelHeight - gap);
    }
    if (top < viewportPadding) {
      top = viewportPadding;
    }
    panel.style.left = Math.round(left) + 'px';
    panel.style.top = Math.round(top) + 'px';
    syncOverlayState();
  }

  function openPopover(rootElement) {
    if (!(rootElement instanceof HTMLElement)) return;
    const { trigger, panel } = getPopoverParts(rootElement);
    if (!(trigger instanceof HTMLElement) || !(panel instanceof HTMLElement)) return;
    closeAllPopovers(rootElement);
    rootElement.dataset.open = 'true';
    trigger.setAttribute('aria-expanded', 'true');
    panel.hidden = false;
    positionPopover(rootElement);
    window.requestAnimationFrame(() => positionPopover(rootElement));
  }

  doc.addEventListener('click', (event) => {
    const target = event.target instanceof Element ? event.target : null;
    if (!target) return;

    if (scrim instanceof HTMLElement && target === scrim) {
      closeAllPopovers();
      return;
    }

    const appearanceButton = target.closest('[data-theme-value]');
    if (appearanceButton instanceof HTMLElement) {
      event.preventDefault();
      const value = appearanceButton.getAttribute('data-theme-value');
      if (value) setAppearance(value);
      return;
    }

    const schemeButton = target.closest('[data-scheme-value]');
    if (schemeButton instanceof HTMLElement) {
      event.preventDefault();
      const value = schemeButton.getAttribute('data-scheme-value');
      if (value) setScheme(value);
      return;
    }

    const trigger = target.closest('[data-popover-trigger]');
    if (trigger instanceof HTMLElement) {
      event.preventDefault();
      const rootElement = trigger.closest('[data-popover-root]');
      if (!(rootElement instanceof HTMLElement)) return;
      if (rootElement.dataset.open === 'true') {
        closePopover(rootElement);
      } else {
        openPopover(rootElement);
      }
      return;
    }

    if (!target.closest('[data-popover-panel]')) {
      closeAllPopovers();
    }
  });

  doc.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') {
      closeAllPopovers();
    }
  });

  window.addEventListener('resize', () => {
    getOpenPopovers().forEach((node) => positionPopover(node));
    syncOverlayState();
  }, { passive: true });

  window.addEventListener('scroll', () => {
    if (isMobileSheet()) return;
    getOpenPopovers().forEach((node) => positionPopover(node));
  }, { passive: true, capture: true });

  systemSchemeQuery.addEventListener('change', () => {
    if ((root.dataset.colorSchemeMode || 'auto') !== 'auto') return;
    root.dataset.colorScheme = systemSchemeQuery.matches ? 'dark' : 'light';
    updateThemeButtons();
  });

  root.dataset.appearance = normalizeAppearance(root.dataset.appearance || window.localStorage.getItem(appearanceKey) || 'rail');
  updateThemeButtons();
  syncOverlayState();
})();
</script></body>
</html>
