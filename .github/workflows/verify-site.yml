name: Verify docs artifact

on:
  push:
    branches:
      - master
    paths:
      - docs/**
      - .github/workflows/verify-site.yml
  pull_request:
    branches:
      - master
    paths:
      - docs/**
      - .github/workflows/verify-site.yml

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure docs artifact exists
        run: |
          test -f docs/index.html
          test -f docs/feed.xml
          test -d docs/posts
